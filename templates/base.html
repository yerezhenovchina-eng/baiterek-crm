<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}АО «НИХ» Байтерек{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#f5f0e8;--cream2:#ede7d9;--cream3:#e4ddd0;
  --dark:#2d3a1f;--dark2:#1a2410;
  --accent:#7ab317;--accent2:#5a8a0a;
  --mid:#8a9a70;--light:#d4cdb8;--light2:#c4bca8;
  --danger:#c62828;--danger-bg:#ffebee;
  --gold:#e65100;--gold-bg:#fff3e0;
  --radius:4px;--shadow:0 1px 4px rgba(45,58,31,.08);--shadow-md:0 4px 16px rgba(45,58,31,.12);
}


/* ── BODY ── */
body{font-family:'Montserrat',sans-serif;background:var(--cream);color:var(--dark);font-size:13px;min-height:100vh;display:flex;flex-direction:column;}
a{color:var(--dark);text-decoration:none;}

/* ── NAV ── */
.nav{background:var(--cream);border-bottom:1px solid var(--light);display:flex;align-items:stretch;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(45,58,31,.07);}
.nav::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--dark));}
.nav-brand{display:flex;align-items:center;gap:10px;padding:12px 22px;border-right:1px solid var(--light);flex-shrink:0;}
.nav-emblem{width:36px;height:36px;background:var(--dark);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;color:var(--cream);letter-spacing:-.5px;flex-shrink:0;}
.nav-name{font-size:13px;font-weight:800;color:var(--dark);}
.nav-sub{font-size:8px;color:var(--mid);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.nav-links{display:flex;flex:1;overflow-x:auto;}
.nav-links::-webkit-scrollbar{display:none;}
.nl{padding:0 13px;font-size:9px;font-weight:700;letter-spacing:.8px;color:var(--mid);text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;display:flex;align-items:center;white-space:nowrap;transition:all .2s;text-decoration:none;min-height:52px;}
.nl:hover{color:var(--dark);border-bottom-color:var(--accent);}
.nl.active{color:var(--dark);border-bottom-color:var(--accent);font-weight:800;}
.nav-right{display:flex;align-items:center;gap:12px;padding:0 18px;border-left:1px solid var(--light);flex-shrink:0;}
.nav-usr{font-size:9px;color:var(--mid);letter-spacing:1px;text-transform:uppercase;}
.nav-out{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--dark);border:1px solid var(--dark);padding:6px 12px;cursor:pointer;font-family:inherit;background:none;transition:all .3s;border-radius:2px;text-decoration:none;display:inline-flex;align-items:center;}
.nav-out:hover{background:var(--dark);color:var(--cream);}

/* ── MAIN ── */
.main{flex:1;padding:28px 32px;max-width:1400px;width:100%;margin:0 auto;}

/* ── BTN ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--radius);font-family:inherit;font-size:9px;font-weight:700;cursor:pointer;border:none;transition:all .2s;text-decoration:none;letter-spacing:.5px;text-transform:uppercase;}
.btn-primary{background:var(--dark);color:var(--cream);}.btn-primary:hover{background:var(--accent);color:var(--dark);text-decoration:none;}
.btn-accent{background:var(--accent);color:var(--dark);}.btn-accent:hover{background:var(--accent2);color:var(--cream);}
.btn-ghost{background:transparent;color:var(--dark);border:1px solid var(--light2);}.btn-ghost:hover{border-color:var(--dark);background:var(--cream2);text-decoration:none;}
.btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{background:#b71c1c;}
.btn-sm{padding:5px 10px;font-size:9px;}
.btn-xs{padding:3px 6px;font-size:8px;}
.btn-link{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:11px;padding:2px 4px;font-family:inherit;font-weight:600;}
.btn-link-danger{background:none;border:none;color:var(--danger);cursor:pointer;font-size:11px;padding:2px 4px;font-family:inherit;}

/* ── CARD ── */
.card{background:#fff;border:1px solid var(--light);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.card-hdr{padding:10px 18px;background:var(--dark);display:flex;align-items:center;justify-content:space-between;gap:8px;position:relative;}
.card-hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
.card-title{font-size:9px;font-weight:700;color:var(--cream);text-transform:uppercase;letter-spacing:1px;}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--cream2);color:var(--mid);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.6px;padding:8px 14px;text-align:left;border-bottom:1px solid var(--light);}
.tbl td{padding:9px 14px;border-bottom:1px solid var(--cream2);vertical-align:top;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--cream);}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 8px;border-radius:2px;white-space:nowrap;letter-spacing:.3px;}
.b-psd{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;}
.b-mem{background:var(--cream2);color:var(--mid);border:1px solid var(--light);}
.b-ind{background:var(--gold-bg);color:var(--gold);border:1px solid #ffcc80;}
.b-head{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;}
.b-emp{background:var(--cream2);color:var(--mid);border:1px solid var(--light);}
.b-done{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
.b-notdone{background:var(--danger-bg);color:var(--danger);border:1px solid #ef9a9a;}
.b-admin{background:var(--dark);color:var(--cream);}
.b-staff{background:var(--cream2);color:var(--mid);border:1px solid var(--light);}

/* ── TABS ── */
.tab-bar{display:flex;border-bottom:2px solid var(--light);margin-bottom:20px;overflow-x:auto;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{padding:10px 18px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--mid);cursor:pointer;border:none;border-bottom:3px solid transparent;background:transparent;font-family:inherit;margin-bottom:-2px;white-space:nowrap;transition:all .2s;}
.tab-btn:hover{color:var(--dark);}
.tab-btn.active{color:var(--dark);border-bottom-color:var(--accent);}

/* ── ACCORDION ── */
.acc-hdr{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;transition:background .12s;border-left:3px solid var(--accent);}
.acc-hdr:hover{background:var(--cream);}
.acc-body{display:none;border-top:1px solid var(--light);padding:16px;}
.acc-body.open{display:block;}

/* ── FORM ── */
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:9px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--cream2);border:1px solid var(--light);border-radius:var(--radius);color:var(--dark);font-family:inherit;font-size:12px;padding:8px 10px;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent);}
.fg textarea{resize:vertical;min-height:55px;}
.fgrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fgrow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,36,16,.45);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.modal-bg.open{display:flex;}
.modal{background:var(--cream);border:1px solid var(--light);border-radius:6px;padding:24px;width:520px;max-width:95vw;box-shadow:var(--shadow-md);max-height:90vh;overflow-y:auto;position:relative;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px 6px 0 0;}
.modal-title{font-size:13px;font-weight:800;color:var(--dark);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--light);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;border-top:1px solid var(--light);padding-top:12px;}

/* ── PAGE HDR ── */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
.page-title{font-size:18px;font-weight:900;color:var(--dark);letter-spacing:-.5px;}

/* ── ORG STRIP ── */
.org-strip{background:var(--dark);padding:14px 32px;margin:-28px -32px 24px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
.org-strip::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);}
.org-strip-badge{background:rgba(122,179,23,.15);border:1px solid rgba(122,179,23,.3);border-radius:3px;padding:4px 12px;font-size:12px;font-weight:800;color:var(--accent);}
.org-strip-name{font-size:14px;font-weight:700;color:var(--cream);}
.org-strip-readonly{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:3px;padding:4px 12px;font-size:9px;font-weight:600;color:rgba(245,240,232,.5);letter-spacing:1px;text-transform:uppercase;margin-left:auto;}
.org-strip-editable{background:rgba(122,179,23,.15);border:1px solid rgba(122,179,23,.3);border-radius:3px;padding:4px 12px;font-size:9px;font-weight:600;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-left:auto;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-box{background:#fff;border:1px solid var(--light);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);}
.stat-val{font-size:28px;font-weight:900;color:var(--dark);letter-spacing:-1px;}
.stat-lbl{font-size:9px;color:var(--mid);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;}

/* ── ORG GRID ── */
.org-grid{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--light);border-radius:var(--radius);overflow:hidden;background:var(--light);gap:1px;}
.org-cell{background:var(--cream);padding:20px 18px;cursor:pointer;transition:background .15s;position:relative;overflow:hidden;text-decoration:none;display:block;color:var(--dark);}
.org-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .25s;}
.org-cell:hover{background:var(--cream2);}
.org-cell:hover::before{transform:scaleX(1);}
.org-cell-short{font-size:15px;font-weight:900;color:var(--dark);margin-bottom:5px;letter-spacing:-.5px;}
.org-cell-name{font-size:9px;color:var(--mid);line-height:1.5;min-height:26px;}
.org-cell-line{width:16px;height:2px;background:var(--light2);margin:12px 0;}
.org-cell-num{font-size:22px;font-weight:900;color:var(--light2);}
.org-cell-lbl{font-size:8px;color:var(--mid);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
.org-cell-arr{position:absolute;bottom:14px;right:14px;font-size:14px;color:var(--light2);transition:all .25s;}
.org-cell:hover .org-cell-arr{color:var(--accent);transform:translate(2px,-2px);}

/* ── HINT ── */
.hint-box{background:#f0f7e8;border:1px solid #c5e0a0;border-radius:var(--radius);padding:8px 12px;font-size:11px;color:var(--accent2);margin-bottom:10px;}

/* ── FILE DROP ── */
.file-drop{border:2px dashed var(--light2);border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;background:var(--cream2);transition:all .2s;}
.file-drop:hover{border-color:var(--accent);background:var(--cream);}

/* ── DOC PREVIEW ── */
.doc-preview-pane{display:none;border-top:1px solid var(--light);background:#f8f6f1;}
.doc-preview-pane.open{display:block;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--light2);border-radius:2px;}
/* Logo in nav */
.nl-logo{height:18px;width:40px;object-fit:contain;display:inline-block;vertical-align:middle;margin-right:3px;}

/* Org cell logo (variant B - top right corner) */
.org-cell-logo{position:absolute;top:10px;right:10px;height:24px;width:65px;display:flex;align-items:center;justify-content:flex-end;}
.org-cell-logo img{max-height:24px;max-width:65px;object-fit:contain;}

/* Page transition animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.main{animation:fadeIn .3s ease;}
.tab-pane{animation:fadeInUp .25s ease;}

/* Footer */
.site-footer{text-align:center;padding:14px;font-size:8px;color:var(--light2);letter-spacing:2px;text-transform:uppercase;border-top:1px solid var(--light);margin-top:32px;}
